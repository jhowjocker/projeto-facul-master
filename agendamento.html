<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Agendamento | consulta.com</title>
  <meta name="description" content="agendamento.">

  <link rel="preload" href="./css/style.css" as="style">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body id="agendamento">
  <header class="header-bg">
    <div class="header container">
      <a href="./">
        <img src="./img/Consulta.com.svg" alt="consulta.com">
      </a>

      <nav aria-label="primaria">
        <ul class="header-menu font-1-m cor-0">
          <li><a href="./index.html">Home</a></li>
          <li><a href="./cadastro.html">Cadastro</a></li>
          <li><a href="./agendamento.html">Agendamento</a></li>
          <li><a href="./medico.html">Login-Médico</a></li>          
        </ul>
      </nav>
    </div>
  </header>

  <section class="agendamento-bg">
    <div class="agendamento container">
      <h1 class="font-1-xxl cor-0">Agende sua Consulta<span class="cor-p1">.</span></h1>

      <form>
        <label for="data">Escolha a data:</label>
        <input type="date" id="data" name="data" required>
        <button type="submit">Agendar</button>
      </form>
    </div>
  </section>

  <footer class="footer-bg">
    <div class="footer container">
      <img src="./img/Consulta.com.svg" width="250" height="32" alt="consulta.com">
      <div class="footer-contato">
        <h3 class="font-2-l-b cor-0">Contato</h3>
        <ul class="font-2-m cor-5">
          <li><a href="tel:+552199999999">+55 21 9999-9999</a></li>
          <li><a href="mailto:contato@consultacom">contato@consulta.com</a></li>
          <li>Avenida Ali Perto, 42 - Algum Lugar</li>
          <li>Cidade - EST</li>
        </ul>
        <div class="footer-redes">
          <a href="./">
            <img src="./img/redes/instagram.svg" width="32" height="32" alt="Instagram">
          </a>
          <a href="./">
            <img src="./img/redes/facebook.svg" width="32" height="32" alt="Facebook">
          </a>
          <a href="./">
            <img src="./img/redes/youtube.svg" width="32" height="32" alt="Youtube">
          </a>
        </div>
      </div>
      <div class="footer-informacoes">
        <h3 class="font-2-l-b cor-0">Informações</h3>
        <nav>
          <ul class="font-1-m cor-5">
            <li><a href="#consulta">Consultas</a></li>
            <li><a href="#contato.html">Contato</a></li>
            <li><a href="#termos.html">Termos e Condições</a></li>
          </ul>
        </nav>
      </div>
      <p class="footer-copy font-2-m cor-6">Consulta.com © Alguns direitos reservados.</p>
    </div>
  </footer>

  <script>
    // Configuração da URL base da API (backend Flask)
    const API_BASE_URL = 'http://localhost:5000'; // Altere se o backend estiver em outro endereço

    // Obtém o ID do paciente da URL
    const urlParams = new URLSearchParams(window.location.search);
    const pacienteId = urlParams.get('paciente_id');

    const form = document.querySelector('.agendamento form');

    if (form) {
      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        // Verifica se o paciente foi identificado
        if (!pacienteId) {
          alert('Paciente não identificado. Faça o cadastro primeiro.');
          window.location.href = '/cadastro.html';
          return;
        }

        const formData = new FormData(form);
        const dataConsulta = formData.get('data');

        if (!dataConsulta) {
          alert('Selecione uma data');
          return;
        }

        // Monta o objeto no formato esperado pelo backend
        const agendamento = {
          paciente_id: pacienteId,  // backend espera "paciente_id" (com _)
          data_consulta: dataConsulta
        };

        try {
          const response = await fetch(`${API_BASE_URL}/api/agendamentos`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(agendamento)
          });

          const result = await response.json();

          if (!response.ok) {
            alert(`Erro: ${result.erro || 'Erro desconhecido'}`);
            return;
          }

          alert('Consulta agendada com sucesso!');
          window.location.href = '/index.html';
        } catch (error) {
          console.error('Erro na requisição:', error);
          alert('Erro de conexão com o servidor. Verifique se o backend está rodando.');
        }
      });
    } else {
      console.error('Formulário não encontrado!');
    }
  </script>
</body>

</html>
